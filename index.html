<!DOCTYPE html>
<html>
<head>
<title>UTSA Parking Availability</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>UTSA Parking Availability</h1>
<p></p>


<label for="parking">Where would you like to park?</label>
<select name="parking" id="parking">
    <option value="" disabled selected hidden>-- Select an option --</option>
  <optgroup label="Garages">
    <option value=BRG>Baurele Road Garage</option>
    <option value=TAG>Tobin Avenue Road Garage</option>
    <option value=XAG>Ximenes Avenue Road Garage</option>
  </optgroup>
  
  <optgroup label="Resident Lots">
    <option value=R1>Resident Lot 1</option>
    <option value=R2>Resident Lot 2</option>
    <option value=R4>Resident Lot 4</option>
    <option value=R5>Resident Lot 5</option>
  </optgroup>
  
  <optgroup label="Commuter Lots">
    <option value=BK1>Brackenridge Lot 1</option>
    <option value=BK2>Brackenridge Lot 2</option>
    <option value=BK3>Brackenridge Lot 3</option>
    <option value=BK4>Brackenridge Lot 4</option>
    <option value=BK5>Brackenridge Lot 5</option>
    
    <option value=BR1>Baurele Lot 1</option>
    <option value=BR1>Baurele Lot 2</option>
    <option value=BR1>Baurele Lot 3</option>
    
    <option value=BS>Barshop Boulevard Lot</option>
    
    <option value=XL>Ximenes Avenue Lot</option>
    
  </optgroup>
</select>

</body>
</html>
